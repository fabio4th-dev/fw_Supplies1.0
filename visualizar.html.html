<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização de Material - FW Supplies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 184, 148, 0.3);
        }

        .card-header h1 {
            color: #00b894;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card-header p {
            color: #bdc3c7;
            font-size: 14px;
        }

        .material-foto {
            text-align: center;
            padding: 30px;
            background: #0f0f1a;
            border-bottom: 1px solid #2c3e50;
        }

        .material-foto img {
            max-width: 250px;
            max-height: 250px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 2px solid #00b894;
        }

        .material-foto .no-image {
            width: 200px;
            height: 200px;
            background: #2d2d44;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            color: #7f8c8d;
            font-size: 48px;
        }

        .material-info {
            padding: 25px;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #2c3e50;
        }

        .info-label {
            width: 120px;
            font-weight: 600;
            color: #00b894;
        }

        .info-value {
            flex: 1;
            color: #ecf0f1;
        }

        .info-value .codigo {
            background: rgba(0, 184, 148, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-baixo {
            background-color: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .status-normal {
            background-color: rgba(0, 184, 148, 0.2);
            color: #00b894;
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #00b894, #00a884);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-voltar:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #00b894;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #e74c3c;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1><i class="fas fa-box"></i> Detalhes do Material</h1>
                <p>Sistema de Gestão de Materiais de Consumo</p>
            </div>
            <div id="content">
                <div class="loading">
                    <i class="fas fa-spinner fa-pulse fa-2x"></i>
                    <p>Carregando informações do material...</p>
                </div>
            </div>
        </div>
        <div style="text-align: center;">
            <a href="https://fabio4th-dev.github.io/fw_Supplies1.0/" class="btn-voltar">
                <i class="fas fa-arrow-left"></i> Voltar ao Sistema
            </a>
        </div>
        <div class="footer">
            <p>FW Company - Sistema de Gestão de Materiais</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eokhafnfmynhridksnuh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVva2hhZm5mbXluaHJpZGtzbnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMzYwMDIsImV4cCI6MjA4NTcxMjAwMn0.-RZtzUYpdOI4_WKOmP9lqw9guJmvh8XFeAL6UXhA4vo';

        let supabaseClient = null;

        async function carregarMaterial() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('item');

            if (!itemId) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <p>ID do material não informado!</p>
                    </div>
                `;
                return;
            }

            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                const { data, error } = await supabaseClient
                    .from('materiais_consumo')
                    .select('*')
                    .eq('id', parseInt(itemId))
                    .single();

                if (error || !data) {
                    throw new Error('Material não encontrado');
                }

                exibirMaterial(data);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle fa-2x"></i>
                        <p>Material não encontrado!</p>
                        <p style="font-size: 12px; margin-top: 10px;">ID: ${itemId}</p>
                    </div>
                `;
            }
        }

        function exibirMaterial(material) {
            const quantidadeExibida = material.unidade === 'kg' ? 
                `${parseFloat(material.quantidade).toFixed(2)} kg` : 
                `${Math.floor(material.quantidade)} unidade${material.quantidade !== 1 ? 's' : ''}`;
            
            const kgExibido = material.quilogramas ? 
                `${parseFloat(material.quilogramas).toFixed(2)} kg` : 
                'Não informado';
            
            const status = (material.unidade === 'kg' ? material.quantidade : material.quantidade) <= (material.estoque_minimo || 0) ? 
                'Baixo Estoque' : 'Normal';
            const statusClass = status === 'Baixo Estoque' ? 'status-baixo' : 'status-normal';

            const fotoHtml = material.imagem && (material.imagem.startsWith('http') || material.imagem.startsWith('data:')) ?
                `<img src="${material.imagem}" alt="Foto do material" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                 <div class="no-image" style="display: none;"><i class="fas fa-image"></i></div>` :
                `<div class="no-image"><i class="fas fa-image"></i></div>`;

            document.getElementById('content').innerHTML = `
                <div class="material-foto">
                    ${fotoHtml}
                </div>
                <div class="material-info">
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-barcode"></i> Código:</div>
                        <div class="info-value"><span class="codigo">${material.codigo || '---'}</span></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-tag"></i> Nome:</div>
                        <div class="info-value"><strong>${escapeHtml(material.nome)}</strong></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-boxes"></i> Tipo:</div>
                        <div class="info-value">${escapeHtml(material.tipo)}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-ruler"></i> Unidade:</div>
                        <div class="info-value">${material.unidade === 'kg' ? 'Quilograma (kg)' : 'Unidade (peça)'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-cubes"></i> Quantidade:</div>
                        <div class="info-value">${quantidadeExibida}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-weight-hanging"></i> Peso (kg):</div>
                        <div class="info-value">${kgExibido}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-map-marker-alt"></i> Localização:</div>
                        <div class="info-value">${escapeHtml(material.localizacao) || 'Não informada'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-chart-line"></i> Status:</div>
                        <div class="info-value"><span class="status-badge ${statusClass}">${status}</span></div>
                    </div>
                    ${material.observacoes ? `
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-comment"></i> Observações:</div>
                        <div class="info-value">${escapeHtml(material.observacoes)}</div>
                    </div>
                    ` : ''}
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-calendar"></i> Cadastro:</div>
                        <div class="info-value">${material.data_cadastro || 'Não informada'}</div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        carregarMaterial();
    </script>
</body>
</html>
